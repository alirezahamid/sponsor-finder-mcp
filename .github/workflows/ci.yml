name: CI

# Build + test on every push/PR to main and on version tags. The docker job
# publishes an image only for tag pushes (v1.2.3), and the smoke job runs the
# live-secret integration test only on direct pushes to main.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── Lint, typecheck, unit tests, build ────────────────────────────────────
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  # ── Build & push the container image (tag pushes only) ────────────────────
  docker:
    name: Build & push image
    needs: build
    # Only publish for version tags, e.g. v1.0.0.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/alirezahamid/sponsor-finder-mcp
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Live smoke test (pushes to main only, needs real upstream secrets) ────
  smoke:
    name: Smoke test (live API)
    needs: build
    # Gate on event/branch/fork here; the secret itself is checked in a step
    # below, because secrets cannot be referenced in a job-level `if`.
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.repository == 'alirezahamid/sponsor-finder-mcp'
    runs-on: ubuntu-latest
    steps:
      - name: Check for secrets
        id: guard
        env:
          SPONSORFINDER_API_KEY: ${{ secrets.SPONSORFINDER_API_KEY }}
        # If the secret is unset (e.g. on a fork without access), skip the rest.
        run: |
          if [ -n "$SPONSORFINDER_API_KEY" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "No SPONSORFINDER_API_KEY configured; skipping smoke test."
          fi

      - name: Checkout
        if: steps.guard.outputs.has_secrets == 'true'
        uses: actions/checkout@v4

      - name: Set up pnpm
        if: steps.guard.outputs.has_secrets == 'true'
        uses: pnpm/action-setup@v4

      - name: Set up Node
        if: steps.guard.outputs.has_secrets == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        if: steps.guard.outputs.has_secrets == 'true'
        run: pnpm install --frozen-lockfile

      - name: Smoke test
        if: steps.guard.outputs.has_secrets == 'true'
        env:
          SPONSORFINDER_API_BASE: ${{ secrets.SPONSORFINDER_API_BASE }}
          SPONSORFINDER_API_KEY: ${{ secrets.SPONSORFINDER_API_KEY }}
        run: pnpm test:smoke
